name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '22'
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev upx dpkg fakeroot

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        env:
          WIRROR_TAGS: webkit2_41
        run: wails build -platform linux/amd64 -upx

      - name: Package tar.gz
        run: |
          VERSION=${RELEASE_TAG#v}
          mkdir -p dist
          tar czf "dist/Crisper-${VERSION}-linux-amd64.tar.gz" -C build/bin Crisper

      - name: Package .deb
        run: |
          VERSION=${RELEASE_TAG#v}
          PKGDIR="dist/deb"
          mkdir -p "${PKGDIR}/DEBIAN"
          mkdir -p "${PKGDIR}/usr/bin"
          mkdir -p "${PKGDIR}/usr/share/applications"
          mkdir -p "${PKGDIR}/usr/share/icons/hicolor/256x256/apps"

          cp build/bin/Crisper "${PKGDIR}/usr/bin/"
          chmod 755 "${PKGDIR}/usr/bin/Crisper"

          cat > "${PKGDIR}/DEBIAN/control" << EOF
          Package: crisper
          Version: ${VERSION}
          Architecture: amd64
          Depends: libgtk-3-0 (>= 3.22), libwebkit2gtk-4.1-0 (>= 2.40), ffmpeg
          Maintainer: psychosomat <hello@ddark.dev>
          Description: Local video transcription with speaker diarization
           Crisper is a desktop application for transcribing video to Markdown
           format with speaker diarization support.
          EOF

          cat > "${PKGDIR}/usr/share/applications/crisper.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=Crisper
          Exec=/usr/bin/Crisper
          Icon=crisper
          Categories=AudioVideo;Audio;
          Terminal=false
          EOF

          cp build/appicon.png "${PKGDIR}/usr/share/icons/hicolor/256x256/apps/crisper.png"

          dpkg-deb --build "${PKGDIR}" "dist/Crisper-${VERSION}-linux-amd64.deb"

      - name: Package AppImage
        run: |
          VERSION=${RELEASE_TAG#v}
          APPDIR="dist/AppDir"
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp build/bin/Crisper "${APPDIR}/usr/bin/"
          chmod 755 "${APPDIR}/usr/bin/Crisper"

          cat > "${APPDIR}/usr/share/applications/crisper.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=Crisper
          Exec=Crisper
          Icon=crisper
          Categories=AudioVideo;Audio;
          Terminal=false
          EOF

          ln -sf usr/share/applications/crisper.desktop "${APPDIR}/crisper.desktop"

          cp build/appicon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/crisper.png"
          ln -sf usr/share/icons/hicolor/256x256/apps/crisper.png "${APPDIR}/crisper.png"

          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${HERE}/usr/sbin:${HERE}/usr/games:${HERE}/bin:${HERE}/sbin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/lib/x86_64-linux-gnu:${HERE}/usr/lib64:${HERE}/lib:${HERE}/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/Crisper" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool "${APPDIR}" "dist/Crisper-${VERSION}-linux-amd64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform windows/amd64 -nsis

      - name: Package
        shell: bash
        run: |
          VERSION=${RELEASE_TAG#v}
          mkdir -p dist
          ls -la build/bin/ || true
          if [ -f build/bin/Crisper-amd64-installer.exe ]; then
            cp build/bin/Crisper-amd64-installer.exe "dist/Crisper-${VERSION}-windows-amd64.exe"
          elif [ -f build/bin/Crisper-installer.exe ]; then
            cp build/bin/Crisper-installer.exe "dist/Crisper-${VERSION}-windows-amd64.exe"
          elif [ -f build/bin/Crisper.exe ]; then
            cp build/bin/Crisper.exe "dist/Crisper-${VERSION}-windows-amd64.exe"
          else
            echo "No Windows binary found in build/bin/"
            exit 1
          fi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/*
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build arm64
        run: wails build -platform darwin/arm64

      - name: Package arm64 DMG
        run: |
          VERSION=${RELEASE_TAG#v}
          mkdir -p dist
          create-dmg \
            --volname "Crisper" \
            --volicon "build/appicon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Crisper.app" 175 190 \
            --hide-extension "Crisper.app" \
            --app-drop-link 425 190 \
            "dist/Crisper-${VERSION}-macos-arm64.dmg" \
            "build/bin/Crisper.app"

      - name: Build amd64
        run: wails build -platform darwin/amd64

      - name: Package amd64 DMG
        run: |
          VERSION=${RELEASE_TAG#v}
          create-dmg \
            --volname "Crisper" \
            --volicon "build/appicon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Crisper.app" 175 190 \
            --hide-extension "Crisper.app" \
            --app-drop-link 425 190 \
            "dist/Crisper-${VERSION}-macos-amd64.dmg" \
            "build/bin/Crisper.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: '*-artifacts'
          merge-multiple: true

      - name: List release artifacts
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Crisper ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          files: release/*

  publish-aur:
    name: Publish AUR package
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux tarball
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release

      - name: Compute tarball SHA256
        id: sha
        run: |
          sha=$(sha256sum release/Crisper-*-linux-amd64.tar.gz | cut -d' ' -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Add AUR to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Render AUR packaging files
        shell: bash
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          VERSION=${VERSION#v}
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Crisper-${VERSION}-linux-amd64.tar.gz"
          ./scripts/render-aur.sh "$VERSION" "$SOURCE_URL" "${{ steps.sha.outputs.sha }}"

      - name: Commit AUR packaging files
        run: |
          git config user.name "Crisper Release Bot"
          git config user.email "github-actions@crisper.local"
          git checkout main
          git add packaging/aur/PKGBUILD packaging/aur/.SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR packaging changes to commit."
            exit 0
          fi
          git commit -m "chore(aur): update crisper-bin packaging for ${{ env.RELEASE_TAG }}"
          git push origin main

      - name: Publish AUR package update
        shell: bash
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          VERSION=${VERSION#v}
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Crisper-${VERSION}-linux-amd64.tar.gz"
          ./scripts/update-aur.sh "$VERSION" "$SOURCE_URL" "${{ steps.sha.outputs.sha }}"
